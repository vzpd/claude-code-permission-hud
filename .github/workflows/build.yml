name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so `git describe` has tags for --version

      - name: Swift toolchain info
        run: swift --version

      - name: Build (native)
        run: make build

      - name: Run regression tests
        run: make test

      - name: Build universal (arm64 + x86_64)
        run: make universal

      - name: Verify fat binary
        run: lipo -info build/claude-notify

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: claude-notify-universal
          path: build/claude-notify
          if-no-files-found: error
